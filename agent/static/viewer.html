<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria Agent — Live View</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Consolas', 'Monaco', monospace;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 13px;
      flex-shrink: 0;
    }
    #topbar .logo { color: #58a6ff; font-weight: bold; font-size: 15px; }
    #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #484f58; margin-right: 6px; }
    #status-dot.connected { background: #3fb950; }
    #status-dot.running   { background: #f0883e; }
    #status-dot.error     { background: #f85149; }
    #status-text { font-size: 12px; color: #8b949e; }

    /* ── Input bar ───────────────────────────────────────────────────────── */
    #inputbar {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    #session-input {
      width: 220px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
    }
    #query-input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    #query-input:focus, #session-input:focus { outline: none; border-color: #58a6ff; }
    #send-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #2ea043; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #clear-btn {
      background: #21262d;
      color: #8b949e;
      border: 1px solid #30363d;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    #clear-btn:hover { background: #30363d; }

    /* ── Main two-pane area ──────────────────────────────────────────────── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left pane: event stream ─────────────────────────────────────────── */
    #left {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 2px solid #30363d;
      min-width: 0;
    }
    #left-header {
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    #events {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      scroll-behavior: smooth;
    }
    #events::-webkit-scrollbar { width: 6px; }
    #events::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* Event cards */
    .ev {
      margin: 4px 0;
      padding: 7px 10px;
      border-radius: 5px;
      font-size: 12px;
      line-height: 1.5;
      border-left: 3px solid transparent;
      background: #161b22;
      word-break: break-word;
    }
    .ev-scraper   { border-color: #a371f7; }
    .ev-skill_log { border-color: #484f58; color: #8b949e; font-size: 11px; }
    .ev-skill_loading, .ev-skills_ready { border-color: #3fb950; }
    .ev-agent_started { border-color: #58a6ff; }
    .ev-thinking  { border-color: #484f58; color: #8b949e; font-style: italic; }
    .ev-tool_use  { border-color: #f0883e; }
    .ev-skill_start { border-color: #3fb950; }
    .ev-text      { border-color: #58a6ff; white-space: pre-wrap; }
    .ev-result    { border-color: #a371f7; }
    .ev-final_response { border-color: #58a6ff; background: #0d1117; white-space: pre-wrap; }
    .ev-completed { border-color: #3fb950; }
    .ev-error     { border-color: #f85149; color: #f85149; }
    .ev-done      { border-color: #3fb950; color: #3fb950; font-weight: bold; }

    .ev-label { font-weight: bold; margin-right: 6px; }
    .ev-tool-name  { color: #f0883e; }
    .ev-skill-name { color: #3fb950; }
    .ev-ts { float: right; font-size: 10px; color: #484f58; }

    .ev-input-block {
      margin-top: 4px;
      padding: 4px 8px;
      background: #0d1117;
      border-radius: 3px;
      font-size: 11px;
      color: #8b949e;
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
    }

    /* ── Right pane ──────────────────────────────────────────────────────── */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #000;
    }
    #right-header {
      padding: 8px 14px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    /* Activity log — above video */
    #activity-log {
      height: 160px;
      overflow-y: auto;
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 6px 10px;
      font-size: 11px;
      color: #00ff41;
      font-family: 'Consolas', 'Monaco', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      flex-shrink: 0;
    }
    #activity-log::-webkit-scrollbar { width: 4px; }
    #activity-log::-webkit-scrollbar-thumb { background: #30363d; }
    /* Video area */
    #video-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 0;
    }
    #video-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #484f58;
      gap: 12px;
    }
    #video-placeholder .icon { font-size: 40px; }
    #video-placeholder .msg  { font-size: 12px; }
    #video-status { font-size: 11px; color: #3fb950; }
    #live-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
      background: #000;
    }
    #download-btn {
      display: none;
      background: #238636;
      color: #fff;
      border: none;
      padding: 4px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      text-decoration: none;
    }
    #download-btn:hover { background: #2ea043; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">🤖 Aria Agent</span>
  <span>
    <span id="status-dot"></span>
    <span id="status-text">Disconnected</span>
  </span>
</div>

<!-- Input bar -->
<div id="inputbar">
  <input id="session-input" placeholder="session_id (optional)" />
  <input id="query-input" placeholder="Enter your query..." />
  <button id="clear-btn" onclick="clearEvents()">Clear</button>
  <button id="send-btn" onclick="sendQuery()">▶ Send</button>
</div>

<!-- Two-pane main area -->
<div id="main">

  <!-- LEFT: agent reasoning stream -->
  <div id="left">
    <div id="left-header">🧠 Agent Reasoning &amp; Tool Execution</div>
    <div id="events"></div>
  </div>

  <!-- RIGHT: activity log + live HLS video -->
  <div id="right">
    <div id="right-header">
      <span>🎥 Computer View</span>
      <span style="display:flex;gap:8px;align-items:center;">
        <span id="video-status"></span>
        <a id="download-btn" href="/download-recording" target="_blank">⬇ Download MP4</a>
      </span>
    </div>
    <!-- Agent activity log (above video, synced with left pane) -->
    <div id="activity-log">Waiting for agent...</div>
    <!-- Live video -->
    <div id="video-wrap">
      <div id="video-placeholder">
        <div class="icon">🎥</div>
        <div class="msg">Loading video stream...</div>
      </div>
      <video id="live-video" autoplay muted playsinline></video>
    </div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  const host   = window.location.hostname;
  const wsUrl  = `ws://${host}:8000/ws`;
  const hlsUrl = `http://${host}:8000/hls/stream.m3u8`;

  let screenshotCount = 0;

  // ── Activity log (above video) ───────────────────────────────────────────────
  function appendActivityLog(text) {
    const log = document.getElementById('activity-log');
    const ts  = new Date().toLocaleTimeString('en-US', { hour12: false });
    log.textContent += `[${ts}] ${text}\n`;
    log.scrollTop = log.scrollHeight;
  }

  // ── HLS Video Player ─────────────────────────────────────────────────────────
  function initHLS() {
    const video       = document.getElementById('live-video');
    const placeholder = document.getElementById('video-placeholder');
    const statusEl    = document.getElementById('video-status');
    const dlBtn       = document.getElementById('download-btn');

    function showVideo() {
      placeholder.style.display = 'none';
      video.style.display = 'block';
      video.style.width   = '100%';
      video.style.height  = '100%';
    }

    if (Hls.isSupported()) {
      const hls = new Hls({
        lowLatencyMode: true,
        liveSyncDurationCount: 1,
        liveMaxLatencyDurationCount: 3,
        maxBufferLength: 4,
        maxMaxBufferLength: 8,
        liveDurationInfinity: true,
      });

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        statusEl.textContent = '● LIVE';
        statusEl.style.color = '#f85149';
        showVideo();
        video.play().catch(() => {});
        dlBtn.style.display = 'inline-block';
      });

      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          statusEl.textContent = 'Reconnecting...';
          statusEl.style.color = '#f0883e';
          setTimeout(() => { hls.loadSource(hlsUrl); }, 2000);
        }
      });

      // Poll until HLS manifest appears (ffmpeg writes first chunk after ~2s)
      function tryLoad() {
        fetch(hlsUrl, { method: 'HEAD' })
          .then(r => {
            if (r.ok) {
              hls.loadSource(hlsUrl);
              hls.attachMedia(video);
            } else {
              setTimeout(tryLoad, 1500);
            }
          })
          .catch(() => setTimeout(tryLoad, 1500));
      }
      tryLoad();

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = hlsUrl;
      video.addEventListener('loadedmetadata', () => {
        showVideo();
        video.play().catch(() => {});
        statusEl.textContent = '● LIVE';
        statusEl.style.color = '#f85149';
        dlBtn.style.display = 'inline-block';
      });
    } else {
      statusEl.textContent = 'HLS not supported';
    }
  }
  initHLS();

  // ── WebSocket ────────────────────────────────────────────────────────────────
  let ws = null;
  let running = false;

  function setStatus(state, text) {
    const dot = document.getElementById('status-dot');
    dot.className = 'connected';
    document.getElementById('status-text').textContent = text;
    if (state === 'idle')    { dot.className = 'connected'; }
    if (state === 'running') { dot.className = 'running'; }
    if (state === 'error')   { dot.className = 'error'; }
    if (state === 'off')     { dot.className = ''; }
  }

  function connectWS() {
    ws = new WebSocket(wsUrl);
    ws.onopen  = () => setStatus('idle', 'Connected — ready');
    ws.onclose = () => { setStatus('off', 'Disconnected'); setTimeout(connectWS, 3000); };
    ws.onerror = () => setStatus('error', 'Connection error');
    ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
  }
  connectWS();

  // ── Send query ───────────────────────────────────────────────────────────────
  function sendQuery() {
    const query = document.getElementById('query-input').value.trim();
    if (!query || !ws || ws.readyState !== WebSocket.OPEN) return;
    const sessionId = document.getElementById('session-input').value.trim()
                   || crypto.randomUUID().slice(0, 8);

    document.getElementById('send-btn').disabled = true;
    setStatus('running', `Running: ${sessionId}`);

    addEvent({ type: 'agent_started', query, session_id: sessionId });
    ws.send(JSON.stringify({ query, session_id: sessionId }));
  }

  // Enter key submits
  document.getElementById('query-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) sendQuery();
  });

  // ── Event renderer ───────────────────────────────────────────────────────────
  function ts() {
    return new Date().toLocaleTimeString('en-US', { hour12: false });
  }

  function addEvent(ev) {
    const container = document.getElementById('events');
    const div = document.createElement('div');
    div.className = `ev ev-${ev.type}`;

    const time = `<span class="ev-ts">${ts()}</span>`;

    switch (ev.type) {

      case 'skill_loading':
        div.innerHTML = `${time}<span class="ev-label" style="color:#3fb950">📦 SKILL LOAD</span>${ev.message || ''}`;
        break;

      case 'skill_log':
        div.innerHTML = `<span style="color:#484f58">${ev.text || ''}</span>`;
        break;

      case 'skills_ready':
        div.innerHTML = `${time}<span class="ev-label" style="color:#3fb950">✅ SKILLS READY</span>${(ev.skills || []).join(', ')}`;
        break;

      case 'agent_started':
        div.innerHTML = `${time}<span class="ev-label" style="color:#58a6ff">🚀 AGENT START</span>
          <b>query</b>: ${ev.query}<br>
          <b>session</b>: ${ev.session_id}`;
        break;

      case 'thinking':
        if (ev.text) {
          div.innerHTML = `${time}<span class="ev-label">💭 THINKING</span>
            <pre style="margin:6px 0 0;padding:8px;background:#161b22;border-radius:4px;white-space:pre-wrap;font-size:11px;color:#8b949e;max-height:200px;overflow-y:auto">${escHtml(ev.text)}</pre>`;
        } else {
          div.innerHTML = `${time}<span class="ev-label">💭 thinking...</span>`;
        }
        break;

      case 'tool_use':
        const inputStr = JSON.stringify(ev.input || {}, null, 2);
        div.innerHTML = `${time}<span class="ev-label">🔧 TOOL</span><span class="ev-tool-name">${ev.tool}</span>
          <div class="ev-input-block">${escHtml(inputStr)}</div>`;
        break;

      case 'skill_start':
        div.innerHTML = `${time}<span class="ev-label">⚡ SKILL</span><span class="ev-skill-name">${ev.skill}</span>`;
        break;

      case 'text':
        div.innerHTML = `${time}<span class="ev-label" style="color:#58a6ff">📝 TEXT</span>
          <div style="margin-top:4px">${escHtml(ev.text || '')}</div>`;
        break;

      case 'result':
        const resultStr = (ev.text || '').slice(0, 500);
        div.innerHTML = `${time}<span class="ev-label" style="color:#a371f7">→ RESULT</span>
          <div class="ev-input-block">${escHtml(resultStr)}${ev.text && ev.text.length > 500 ? '…' : ''}</div>`;
        break;

      case 'final_response':
        div.innerHTML = `${time}<span class="ev-label" style="color:#58a6ff">🏁 FINAL RESPONSE</span>
          <div style="margin-top:6px; white-space:pre-wrap">${escHtml(ev.response || '')}</div>`;
        break;

      case 'completed':
        div.innerHTML = `${time}<span class="ev-label" style="color:#3fb950">✅ COMPLETED</span>
          ${ev.elapsed_seconds}s | turns: ${ev.turns} | tools: ${ev.tools_used} | skills: ${ev.skills_invoked}`;
        break;

      case 'error':
        div.innerHTML = `${time}<span class="ev-label">❌ ERROR</span>${escHtml(ev.error || '')}`;
        break;

      case 'screenshot':
        // Screenshot captured — show as left-pane event card only.
        // Right pane is now live HLS video — no need to update it here.
        screenshotCount++;
        div.innerHTML = `${time}<span class="ev-label" style="color:#a371f7">📸 SCREENSHOT</span>#${screenshotCount} captured — visible in video feed`;
        break;

      case 'activity_log':
        // Lightweight text event — goes to activity log above video, not left pane card
        appendActivityLog(ev.text || '');
        return;  // skip appending to left-pane events

      case 'done':
        div.innerHTML = `${time}<span class="ev-label">🔚 DONE</span>Session complete`;
        document.getElementById('send-btn').disabled = false;
        setStatus('idle', 'Connected — ready');
        break;

      default:
        div.innerHTML = `${time}<span class="ev-label" style="color:#484f58">${ev.type}</span>${escHtml(JSON.stringify(ev))}`;
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function handleEvent(ev) {
    addEvent(ev);
  }

  function clearEvents() {
    document.getElementById('events').innerHTML = '';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
